<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>零售运营中心利润表 - 高保真原型</title>
  <style>
    :root {
      --primary: #2367e8;
      --primary-dark: #1f5fda;
      --primary-light: #2a8cff;
      --text: #333d4f;
      --muted: #8a93a3;
      --line: #edf0f5;
      --header: #fbfbfc;
      --danger: #ff5b5b;
      --success: #21b573;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-width: 1280px;
      min-height: 720px;
      margin: 0;
      background: #fff;
      color: var(--text);
      font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
      font-size: 12px;
    }

    button,
    input,
    select {
      font-family: inherit;
      font-size: 12px;
    }

    button {
      cursor: pointer;
    }

    .page {
      min-height: 720px;
      background: #fff;
      overflow: hidden;
    }

    .topbar {
      height: 52px;
      display: flex;
      align-items: center;
      background: var(--primary);
      color: #fff;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.14);
    }

    .brand {
      width: 180px;
      height: 52px;
      display: flex;
      align-items: center;
      padding-left: 18px;
      gap: 10px;
      flex-shrink: 0;
      font-weight: 700;
      font-size: 18px;
      letter-spacing: 1px;
    }

    .brand-mark {
      position: relative;
      width: 24px;
      height: 24px;
      flex: 0 0 auto;
    }

    .brand-mark span {
      position: absolute;
      width: 12px;
      height: 12px;
      border-radius: 4px 8px 4px 8px;
      opacity: 0.95;
    }

    .brand-mark .m1 { left: 6px; top: 0; background: #43c462; transform: rotate(45deg); }
    .brand-mark .m2 { right: 0; top: 6px; background: #33a0ff; transform: rotate(45deg); }
    .brand-mark .m3 { left: 6px; bottom: 0; background: #ffb01e; transform: rotate(45deg); }
    .brand-mark .m4 { left: 0; top: 6px; background: #5bd0d8; transform: rotate(45deg); }
    .brand-mark .m5 { left: 8px; top: 8px; width: 8px; height: 8px; border-radius: 50%; background: #fff; opacity: 0.88; }

    .top-nav {
      height: 52px;
      display: flex;
      align-items: stretch;
      flex: 1;
      min-width: 0;
    }

    .nav-item {
      min-width: 90px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #eef4ff;
      font-size: 15px;
      font-weight: 600;
      text-decoration: none;
      white-space: nowrap;
      position: relative;
      padding: 0 16px;
    }

    .nav-item:hover {
      background: rgba(255, 255, 255, 0.08);
    }

    .nav-item.active {
      width: 92px;
      color: var(--primary);
      background: #fff;
      clip-path: polygon(0 0, calc(100% - 14px) 0, 100% 100%, 0 100%);
      margin-right: 6px;
    }

    .nav-item.dimmed {
      opacity: 0.55;
    }

    .top-actions {
      height: 52px;
      display: flex;
      align-items: center;
      gap: 16px;
      padding-right: 12px;
      flex: 0 0 auto;
    }

    .search-box {
      width: 164px;
      height: 28px;
      display: flex;
      align-items: center;
      background: rgba(255, 255, 255, 0.95);
      border-radius: 5px;
      padding: 0 10px;
      color: #aab3c1;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .search-box input {
      width: 128px;
      border: 0;
      outline: 0;
      background: transparent;
      color: #657083;
    }

    .search-icon {
      width: 14px;
      height: 14px;
      margin-left: auto;
      position: relative;
    }

    .search-icon::before {
      content: "";
      position: absolute;
      width: 8px;
      height: 8px;
      border: 2px solid #b6bfcd;
      border-radius: 50%;
      left: 0;
      top: 0;
    }

    .search-icon::after {
      content: "";
      position: absolute;
      width: 7px;
      height: 2px;
      background: #b6bfcd;
      transform: rotate(45deg);
      left: 8px;
      top: 10px;
      border-radius: 1px;
    }

    .top-icon {
      width: 18px;
      height: 18px;
      opacity: 0.95;
      position: relative;
      flex: 0 0 auto;
    }

    .icon-calendar::before {
      content: "";
      position: absolute;
      inset: 2px 3px 2px 3px;
      border: 2px solid #fff;
      border-radius: 2px;
    }

    .icon-calendar::after {
      content: "";
      position: absolute;
      left: 5px;
      right: 5px;
      top: 7px;
      height: 2px;
      background: #fff;
    }

    .icon-bell::before {
      content: "";
      position: absolute;
      left: 4px;
      top: 3px;
      width: 10px;
      height: 12px;
      border: 2px solid #fff;
      border-bottom: 0;
      border-radius: 9px 9px 3px 3px;
    }

    .icon-bell::after {
      content: "";
      position: absolute;
      left: 7px;
      bottom: 1px;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: #fff;
    }

    .icon-full::before,
    .icon-full::after {
      content: "";
      position: absolute;
      width: 6px;
      height: 6px;
      border-color: #fff;
      border-style: solid;
    }

    .icon-full::before {
      left: 0;
      top: 0;
      border-width: 2px 0 0 2px;
      box-shadow: 10px 0 0 -1px transparent;
    }

    .icon-full::after {
      right: 0;
      bottom: 0;
      border-width: 0 2px 2px 0;
    }

    .cdf {
      width: 38px;
      height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: #fff;
      color: #f9a11d;
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -2px;
      border: 2px solid rgba(255, 255, 255, 0.7);
      box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.05) inset;
    }

    .secondary-strip {
      height: 28px;
      display: flex;
      align-items: center;
      background: #fff;
      border-bottom: 1px solid #dcdfe6;
      padding-left: 10px;
    }

    .report-pill {
      min-width: 134px;
      height: 24px;
      padding: 0 22px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      background: #1d86f2;
      border-radius: 4px;
      font-weight: 700;
      box-shadow: 0 1px 0 rgba(0, 0, 0, 0.03);
    }

    .content {
      padding: 16px 10px 0 10px;
    }

    .filters {
      height: 39px;
      display: flex;
      align-items: flex-start;
      gap: 14px;
    }

    .filter-group {
      display: flex;
      align-items: center;
      height: 24px;
      white-space: nowrap;
    }

    .filter-group label {
      height: 24px;
      line-height: 24px;
      color: #111827;
      font-weight: 600;
      margin-right: 4px;
    }

    .filter-text,
    .filter-select {
      height: 24px;
      border: 1px solid #c8d0dc;
      background: #fff;
      color: #455064;
      border-radius: 3px;
      outline: none;
      padding: 0 8px;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .filter-text,
    .filter-select.date-select {
      width: 148px;
    }

    .filter-select.type {
      width: 126px;
    }

    .filter-select.store {
      width: 248px;
    }

    .multi-select {
      position: relative;
      width: 248px;
      height: 24px;
    }

    .multi-select-trigger {
      width: 100%;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border: 1px solid #c8d0dc;
      border-radius: 3px;
      background: #fff;
      color: #455064;
      padding: 0 7px 0 8px;
      text-align: left;
    }

    .multi-select-trigger::after {
      content: "";
      width: 0;
      height: 0;
      border-left: 4px solid transparent;
      border-right: 4px solid transparent;
      border-top: 5px solid #8a93a3;
      margin-left: 8px;
    }

    .multi-select.open .multi-select-trigger {
      border-color: var(--primary-light);
      box-shadow: 0 0 0 2px rgba(42, 140, 255, 0.08);
    }

    .multi-select-menu {
      position: absolute;
      top: 27px;
      left: 0;
      z-index: 30;
      display: none;
      width: 100%;
      padding: 6px 0;
      border: 1px solid #cfd6e2;
      border-radius: 3px;
      background: #fff;
      box-shadow: 0 8px 22px rgba(15, 23, 42, 0.16);
    }

    .multi-select.open .multi-select-menu {
      display: block;
    }

    .multi-option {
      display: flex;
      align-items: center;
      height: 26px;
      padding: 0 10px;
      color: #455064;
      cursor: pointer;
    }

    .multi-option:hover {
      background: #f5f8ff;
    }

    .multi-option input {
      margin: 0 6px 0 0;
    }

    .filter-text:focus,
    .filter-select:focus {
      border-color: var(--primary-light);
      box-shadow: 0 0 0 2px rgba(42, 140, 255, 0.08);
    }

    .date-wrap {
      position: relative;
    }


    .date-wrap input {
      padding-right: 24px;
    }

    .spacer-wide {
      width: 60px;
    }

    .query-actions {
      display: flex;
      gap: 10px;
      margin-left: 0;
    }

    .btn {
      height: 24px;
      min-width: 54px;
      border-radius: 3px;
      border: 1px solid transparent;
      padding: 0 16px;
      line-height: 22px;
      font-weight: 700;
      background: #fff;
      color: #3b4657;
    }

    .btn-primary {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
    }

    .btn-primary:hover {
      background: var(--primary-dark);
    }

    .btn-default {
      border-color: #aeb7c6;
      color: #283346;
    }

    .btn-default:hover {
      border-color: var(--primary);
      color: var(--primary);
    }

    .btn-danger-ghost {
      border-color: #ff9b9b;
      color: #e13c3c;
      background: #fff;
    }

    .btn-danger-ghost:hover {
      border-color: var(--danger);
      color: var(--danger);
      background: #fff7f7;
    }

    .actions-row {
      height: 34px;
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding-top: 0;
    }

    .actions-row .btn {
      height: 24px;
      min-width: 67px;
    }

    .table-wrap {
      width: 100%;
      overflow-x: hidden;
      border-top: 0;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
      color: #646f80;
      font-size: 12px;
    }

    thead tr:first-child th {
      height: 30px;
      background: var(--header);
      color: #263142;
      font-weight: 700;
      border-bottom: 0;
      text-align: center;
    }

    thead tr:nth-child(2) th {
      height: 30px;
      background: #fff;
      color: #263142;
      font-weight: 700;
      border-bottom: 1px solid var(--line);
      text-align: center;
    }

    th,
    td {
      border-bottom: 1px solid var(--line);
      padding: 0 8px;
      height: 31px;
      text-align: center;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    tbody tr {
      background: #fff;
      transition: background 0.12s;
    }

    tbody tr:hover {
      background: #f8fbff;
    }

    tbody tr.selected {
      background: #eef6ff;
      box-shadow: inset 3px 0 0 var(--primary-light);
    }

    .col-index { width: 46px; }
    .col-type { width: 70px; }
    .col-date { width: 88px; }
    .col-code { width: 78px; }
    .col-name { width: 170px; }
    .col-small { width: 86px; }
    .col-operator { width: 82px; }
    .col-time { width: 142px; }
    .col-op { width: 78px; }

    .td-name {
      text-align: left;
    }

    .row-input,
    .row-select {
      width: 100%;
      height: 22px;
      border: 1px solid #d6dce6;
      border-radius: 2px;
      outline: none;
      text-align: center;
      color: #4d596b;
      padding: 0 4px;
      background: #fff;
    }

    .row-input.name-input {
      text-align: left;
    }

    .row-input::placeholder {
      color: #a5afbd;
    }

    .row-input:focus,
    .row-select:focus {
      border-color: var(--primary-light);
      box-shadow: 0 0 0 2px rgba(42, 140, 255, 0.08);
    }

    .operation {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .link-btn {
      border: 0;
      padding: 0;
      background: transparent;
      color: #1890ff;
      font-weight: 700;
      line-height: 1;
    }

    .link-btn:hover {
      color: #0a63cb;
      text-decoration: underline;
    }

    .empty-row td {
      height: 76px;
      color: #9aa4b3;
    }

    .hidden-file {
      display: none;
    }

    .modal-mask {
      position: fixed;
      inset: 0;
      z-index: 40;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(15, 23, 42, 0.32);
    }

    .modal-mask.show {
      display: flex;
    }

    .modal {
      width: 722px;
      background: #fff;
      border-radius: 4px;
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.22);
      overflow: hidden;
    }

    .modal-header {
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 18px;
      border-bottom: 1px solid #edf0f5;
      color: #253044;
      font-size: 15px;
      font-weight: 700;
    }

    .modal-close {
      border: 0;
      background: transparent;
      color: #8792a3;
      font-size: 22px;
      font-weight: 300;
      line-height: 1;
      padding: 0;
    }

    .modal-close:hover {
      color: #283346;
    }

    .modal-body {
      padding: 18px 22px 4px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      column-gap: 26px;
      row-gap: 12px;
    }

    .form-item {
      display: flex;
      align-items: center;
      min-height: 30px;
    }

    .form-item label {
      width: 112px;
      color: #374151;
      font-weight: 600;
      text-align: right;
      padding-right: 10px;
      flex: 0 0 auto;
    }

    .form-item input,
    .form-item select {
      width: 196px;
      height: 28px;
      border: 1px solid #cfd6e2;
      border-radius: 3px;
      outline: none;
      padding: 0 8px;
      color: #455064;
      background: #fff;
    }

    .form-item input:focus,
    .form-item select:focus {
      border-color: var(--primary-light);
      box-shadow: 0 0 0 2px rgba(42, 140, 255, 0.08);
    }

    .form-item.full {
      grid-column: 1 / span 2;
    }

    .form-item.full input {
      width: 530px;
    }

    .import-steps {
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding-bottom: 14px;
    }

    .import-step {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 14px;
      border: 1px solid #edf0f5;
      border-radius: 4px;
      background: #fbfcfe;
    }

    .step-index {
      width: 22px;
      height: 22px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
      border-radius: 50%;
      background: var(--primary);
      color: #fff;
      font-weight: 700;
    }

    .step-content {
      flex: 1;
      min-width: 0;
    }

    .step-title {
      color: #253044;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .step-desc {
      color: #7b8495;
      line-height: 20px;
      margin-bottom: 10px;
    }

    .upload-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .file-name {
      color: #667085;
      max-width: 380px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .required::before {
      content: "*";
      color: var(--danger);
      margin-right: 3px;
    }

    .modal-footer {
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      padding: 0 22px;
      border-top: 1px solid #edf0f5;
      background: #fbfcfe;
    }

    .confirm {
      width: 380px;
      background: #fff;
      border-radius: 4px;
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.22);
      overflow: hidden;
    }

    .confirm-body {
      padding: 28px 30px 18px;
      color: #2f3a4c;
      font-size: 14px;
      line-height: 24px;
    }

    .confirm-title {
      margin-bottom: 8px;
      font-size: 15px;
      font-weight: 700;
      color: #1f2937;
    }

    .confirm-footer {
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      padding: 0 18px;
      background: #fbfcfe;
      border-top: 1px solid #edf0f5;
    }

    .toast {
      position: fixed;
      top: 82px;
      left: 50%;
      z-index: 60;
      min-width: 176px;
      max-width: 420px;
      display: none;
      transform: translateX(-50%);
      background: rgba(37, 48, 68, 0.95);
      color: #fff;
      border-radius: 4px;
      padding: 9px 14px;
      text-align: center;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.18);
    }

    .toast.show {
      display: block;
      animation: toast-in 0.18s ease-out;
    }

    @keyframes toast-in {
      from { opacity: 0; transform: translate(-50%, -8px); }
      to { opacity: 1; transform: translate(-50%, 0); }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true"><span class="m1"></span><span class="m2"></span><span class="m3"></span><span class="m4"></span><span class="m5"></span></span>
        <span>大数据平台</span>
      </div>
      <nav class="top-nav" aria-label="主导航">
        <a class="nav-item" href="javascript:void(0)">系统管理</a>
        <a class="nav-item active" href="javascript:void(0)">经营看板</a>
        <a class="nav-item" href="javascript:void(0)">销售分析</a>
        <a class="nav-item" href="javascript:void(0)">进销存分析</a>
        <a class="nav-item" href="javascript:void(0)">库存分析</a>
        <a class="nav-item" href="javascript:void(0)">顾客分析</a>
        <a class="nav-item" href="javascript:void(0)">采购分析</a>
        <a class="nav-item dimmed" href="javascript:void(0)">提货分析</a>
      </nav>
      <div class="top-actions">
        <div class="search-box">
          <input type="text" placeholder="搜索" aria-label="搜索">
          <span class="search-icon" aria-hidden="true"></span>
        </div>
        <span class="top-icon icon-calendar" aria-hidden="true"></span>
        <span class="top-icon icon-bell" aria-hidden="true"></span>
        <span class="top-icon icon-full" aria-hidden="true"></span>
        <span class="cdf">cdf</span>
      </div>
    </header>

    <div class="secondary-strip">
      <div class="report-pill">零售运营中心利润表</div>
    </div>

    <main class="content">
      <section class="filters" aria-label="查询条件">
        <div class="filter-group">
          <label for="dateType">日期类型：</label>
          <select id="dateType" class="filter-select type">
            <option value="">全部</option>
            <option value="年">年</option>
            <option value="月">月</option>
          </select>
        </div>
        <div class="filter-group">
          <label for="startDate">日期：</label>
          <span class="date-wrap"><select id="startDate" class="filter-select date-select"></select></span>
        </div>
        <div class="filter-group">
          <label for="endDate">至</label>
          <span class="date-wrap"><select id="endDate" class="filter-select date-select"></select></span>
        </div>
        <div class="filter-group">
          <label for="storeTrigger">门店：</label>
          <div class="multi-select" id="storeFilter">
            <button class="multi-select-trigger" type="button" id="storeTrigger" aria-haspopup="listbox" aria-expanded="false">全部</button>
            <div class="multi-select-menu" role="listbox" aria-multiselectable="true">
              <label class="multi-option"><input type="checkbox" value="6826" checked>6826 广州新免免税品有限公司</label>
            </div>
          </div>
        </div>
        <div class="spacer-wide"></div>
        <div class="query-actions">
          <button class="btn btn-primary" type="button" id="queryBtn">查询</button>
          <button class="btn btn-default" type="button" id="resetBtn">重置</button>
        </div>
      </section>

      <section class="actions-row" aria-label="表格操作">
        <button class="btn btn-primary" type="button" id="importBtn">导入</button>
        <button class="btn btn-primary" type="button" id="addBtn">+ 新增</button>
        <button class="btn btn-danger-ghost" type="button" id="batchDeleteBtn">批量删除</button>
      </section>

      <section class="table-wrap">
        <table aria-label="零售运营中心利润表">
          <thead>
            <tr>
              <th class="col-index" rowspan="2">序号</th>
              <th class="col-type" rowspan="2">日期类型</th>

  <div class="modal-mask" id="editMask" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal">
      <div class="modal-header">
        <span id="modalTitle">新增</span>
        <button class="modal-close" type="button" id="closeModal" aria-label="关闭">×</button>
      </div>
      <form id="recordForm">
        <div class="modal-body">
          <div class="form-grid">
            <div class="form-item">
              <label class="required" for="formDateType">日期类型</label>
              <select id="formDateType" name="dateType" required>
                <option value="">请选择</option>
                <option value="年">年</option>

              <label class="required" for="formDate">日期</label>

            <div class="form-item">
              <label class="required" for="formStoreCode">门店编码</label>
              <input id="formStoreCode" name="storeCode" type="text" required>
            </div>
            <div class="form-item">
              <label class="required" for="formStoreName">门店名称</label>
              <input id="formStoreName" name="storeName" type="text" required>
            </div>
            <div class="form-item">
              <label for="formRevenueTarget">营业收入-目标数据</label>

              <input id="formRevenueActual" name="revenueActual" type="text">

              <label for="formOfflineTarget">线下收入-目标数据</label>
              <input id="formOfflineTarget" name="offlineTarget" type="text">
            </div>
            <div class="form-item">
              <label for="formOfflineActual">线下收入-实际完成</label>
              <input id="formOfflineActual" name="offlineActual" type="text">
            </div>
            <div class="form-item">
              <label for="formFlowTarget">客流人数-目标数据</label>

              <label for="formVipFlowTarget">离岛客流-目标数据</label>
              <input id="formVipFlowTarget" name="vipFlowTarget" type="text">

            <div class="form-item">
              <label for="formVipFlowActual">离岛客流-实际完成</label>
              <input id="formVipFlowActual" name="vipFlowActual" type="text">

  <div class="modal-mask" id="importMask" role="dialog" aria-modal="true" aria-labelledby="importTitle">
    <div class="modal">
      <div class="modal-header">
        <span id="importTitle">导入数据</span>
        <button class="modal-close" type="button" id="closeImportModal" aria-label="关闭">×</button>
      </div>
      <div class="modal-body">
        <div class="import-steps">
          <div class="import-step">
            <span class="step-index">1</span>
            <div class="step-content">
              <div class="step-title">下载模板</div>
              <div class="step-desc">请先下载标准模板，按字段要求填写后再上传。</div>
              <button class="btn btn-default" type="button" id="downloadTemplateBtn">下载模板</button>
            </div>
          </div>
          <div class="import-step">
            <span class="step-index">2</span>
            <div class="step-content">
              <div class="step-title">上传文件</div>
              <div class="step-desc">支持 .xlsx、.xls、.csv 格式文件。</div>
              <div class="upload-row">
                <button class="btn btn-primary" type="button" id="chooseImportFileBtn">选择文件</button>
                <span class="file-name" id="importFileName">未选择文件</span>
                <input id="importFile" class="hidden-file" type="file" accept=".xlsx,.xls,.csv">
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-default" type="button" id="cancelImportModal">取消</button>
        <button class="btn btn-primary" type="button" id="confirmImportBtn">确定导入</button>
      </div>
    </div>
  </div>

  <div class="modal-mask" id="confirmMask" role="dialog" aria-modal="true" aria-labelledby="confirmTitle">
    <div class="confirm">
      <div class="confirm-body">
        <div class="confirm-title" id="confirmTitle">确认删除</div>
        <div id="confirmText">删除后不可恢复，确认继续？</div>
      </div>
      <div class="confirm-footer">
        <button class="btn btn-default" type="button" id="confirmCancel">取消</button>
        <button class="btn btn-primary" type="button" id="confirmOk">确定</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script>
    const STORAGE_KEY = 'retail_profit_statement_rows_v1';

    const seedRows = [
      {
        id: 'row-1',
        dateType: '年',
        date: '2026',
        storeCode: '6826',
        storeName: '广州新免免税品有限公司',
        revenueTarget: '',
        revenueActual: 'xxxx.xx',
        offlineTarget: '9865.11',
        offlineActual: 'xxxx.xx',
        flowTarget: 'xxxx.xx',
        flowActual: 'xxxx.xx',
        vipFlowTarget: 'xxxx.xx',
        vipFlowActual: 'xxxx.xx',
        operator: 'wangkeke',
        operateTime: '2023-02-13 19:02:00'
      },
      {
        id: 'row-2',
        dateType: '月',
        date: '2026-05',
        storeCode: '6826',
        storeName: '广州新免免税品有限公司',
        revenueTarget: '14,575.25',
        revenueActual: 'xxxx.xx',
        offlineTarget: '9865.11',
        offlineActual: 'xxxx.xx',
        flowTarget: 'xxxx.xx',
        flowActual: 'xxxx.xx',
        vipFlowTarget: 'xxxx.xx',
        vipFlowActual: 'xxxx.xx',
        operator: 'wangkeke',
        operateTime: '2023-02-13 19:02:00'
      },
      {
        id: 'row-3',
        dateType: '月',
        date: '2026-05',
        storeCode: '6826',
        storeName: '广州新免免税品有限公司',
        revenueTarget: '14,575.25',
        revenueActual: 'xxxx.xx',
        offlineTarget: '9865.11',
        offlineActual: 'xxxx.xx',
        flowTarget: 'xxxx.xx',
        flowActual: 'xxxx.xx',
        vipFlowTarget: 'xxxx.xx',
        vipFlowActual: 'xxxx.xx',
        operator: 'wangkeke',
        operateTime: '2023-02-13 19:02:00'
      }
    ];

    let rows = loadRows();
    let visibleRows = [...rows];
    let selectedIds = new Set();
    let editingId = null;
    let inlineEditingId = null;
    let confirmAction = null;

    const tableBody = document.getElementById('tableBody');
    const startDate = document.getElementById('startDate');
    const endDate = document.getElementById('endDate');
    const dateType = document.getElementById('dateType');
    const storeFilter = document.getElementById('storeFilter');
    const storeTrigger = document.getElementById('storeTrigger');
    const editMask = document.getElementById('editMask');
    const importMask = document.getElementById('importMask');
    const confirmMask = document.getElementById('confirmMask');
    const recordForm = document.getElementById('recordForm');
    const modalTitle = document.getElementById('modalTitle');
    const importFile = document.getElementById('importFile');
    const importFileName = document.getElementById('importFileName');
    const toast = document.getElementById('toast');

    updateDateOptions();
    updateStoreTriggerText();
    renderTable();

    document.getElementById('queryBtn').addEventListener('click', handleQuery);
    document.getElementById('resetBtn').addEventListener('click', handleReset);
    dateType.addEventListener('change', handleDateTypeChange);
    storeTrigger.addEventListener('click', toggleStoreFilter);
    storeFilter.addEventListener('change', updateStoreTriggerText);
    document.addEventListener('click', closeStoreFilterOnOutsideClick);
    document.getElementById('addBtn').addEventListener('click', () => openModal());
    document.getElementById('batchDeleteBtn').addEventListener('click', handleBatchDelete);
    document.getElementById('importBtn').addEventListener('click', openImportModal);
    document.getElementById('downloadTemplateBtn').addEventListener('click', downloadTemplate);
    document.getElementById('chooseImportFileBtn').addEventListener('click', () => importFile.click());
    document.getElementById('confirmImportBtn').addEventListener('click', handleImport);
    importFile.addEventListener('change', updateImportFileName);
    document.getElementById('closeImportModal').addEventListener('click', closeImportModal);
    document.getElementById('cancelImportModal').addEventListener('click', closeImportModal);
    document.getElementById('closeModal').addEventListener('click', closeModal);
    document.getElementById('cancelModal').addEventListener('click', closeModal);
    document.getElementById('confirmCancel').addEventListener('click', closeConfirm);
    document.getElementById('confirmOk').addEventListener('click', () => {
      if (typeof confirmAction === 'function') confirmAction();
      closeConfirm();
    });

    editMask.addEventListener('click', (event) => {
      if (event.target === editMask) closeModal();
    });

    importMask.addEventListener('click', (event) => {
      if (event.target === importMask) closeImportModal();
    });

    confirmMask.addEventListener('click', (event) => {
      if (event.target === confirmMask) closeConfirm();
    });

    recordForm.addEventListener('submit', (event) => {
      event.preventDefault();
      const formData = new FormData(recordForm);
      const data = Object.fromEntries(formData.entries());
      const record = normalizeRecord(data);

      if (editingId) {
        rows = rows.map((item) => item.id === editingId ? { ...record, id: editingId } : item);
        showToast('编辑成功');
      } else {
        rows.unshift({ ...record, id: createId() });
        showToast('新增成功');
      }

      saveRows();
      selectedIds.clear();
      updateDateOptions();
      applyCurrentFilters();
      closeModal();
    });

    tableBody.addEventListener('click', (event) => {
      const editButton = event.target.closest('[data-action="edit"]');
      const saveButton = event.target.closest('[data-action="save"]');
      const cancelButton = event.target.closest('[data-action="cancel-edit"]');
      const deleteButton = event.target.closest('[data-action="delete"]');
      const rowField = event.target.closest('[data-field]');

      if (editButton) {
        inlineEditingId = editButton.dataset.id;
        selectedIds.delete(inlineEditingId);
        renderTable();
        return;
      }

      if (saveButton) {
        saveInlineEdit(saveButton.dataset.id);
        return;
      }

      if (cancelButton) {
        inlineEditingId = null;
        renderTable();
        return;
      }

      if (deleteButton) {
        const id = deleteButton.dataset.id;
        openConfirm('确认删除', '删除后不可恢复，确认继续？', () => {
          rows = rows.filter((item) => item.id !== id);
          selectedIds.delete(id);
          saveRows();
          updateDateOptions();
          applyCurrentFilters();
          showToast('删除成功');
        });
        return;
      }

      if (rowField) return;

      const tr = event.target.closest('tr[data-id]');
      if (!tr) return;
      const id = tr.dataset.id;
      if (selectedIds.has(id)) {
        selectedIds.delete(id);
      } else {
        selectedIds.add(id);
      }
      renderTable();
    });

    tableBody.addEventListener('dblclick', (event) => {
      if (event.target.closest('button') || event.target.closest('input') || event.target.closest('select')) return;
      const tr = event.target.closest('tr[data-id]');
      if (!tr) return;
      inlineEditingId = tr.dataset.id;
      selectedIds.delete(inlineEditingId);
      renderTable();
    });

    function loadRows() {
      try {
        const saved = localStorage.getItem(STORAGE_KEY);
        return saved ? JSON.parse(saved) : seedRows.map((item) => ({ ...item }));
      } catch (error) {
        return seedRows.map((item) => ({ ...item }));
      }
    }

    function saveRows() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(rows));
    }

    function renderTable() {
      if (!visibleRows.length) {
        tableBody.innerHTML = '<tr class="empty-row"><td colspan="16">暂无数据</td></tr>';
        return;
      }

      tableBody.innerHTML = visibleRows.map((row, index) => {
        const selected = selectedIds.has(row.id) ? ' selected' : '';
        const isEditing = row.id === inlineEditingId;

        return `
          <tr class="${selected}" data-id="${row.id}" title="单击选择，双击编辑">
            <td>${index + 1}</td>
            ${renderCell(row, 'dateType', isEditing, 'select')}
            ${renderCell(row, 'date', isEditing)}
            ${renderCell(row, 'storeCode', isEditing)}
            ${renderCell(row, 'storeName', isEditing, 'text', 'td-name')}
            ${renderCell(row, 'revenueTarget', isEditing)}
            ${renderCell(row, 'revenueActual', isEditing)}
            ${renderCell(row, 'offlineTarget', isEditing)}
            ${renderCell(row, 'offlineActual', isEditing)}
            ${renderCell(row, 'flowTarget', isEditing)}
            ${renderCell(row, 'flowActual', isEditing)}
            ${renderCell(row, 'vipFlowTarget', isEditing)}
            ${renderCell(row, 'vipFlowActual', isEditing)}
            ${renderCell(row, 'operator', isEditing)}
            ${renderCell(row, 'operateTime', isEditing)}
            <td>
              <span class="operation">
                ${isEditing
                  ? `<button class="link-btn" type="button" data-action="save" data-id="${row.id}">保存</button><button class="link-btn" type="button" data-action="cancel-edit" data-id="${row.id}">取消</button>`
                  : `<button class="link-btn" type="button" data-action="edit" data-id="${row.id}">编辑</button><button class="link-btn" type="button" data-action="delete" data-id="${row.id}">删除</button>`}
              </span>
            </td>
          </tr>
        `;
      }).join('');
    }

    function renderCell(row, field, isEditing, type = 'text', className = '') {
      const classAttr = className ? ` class="${className}"` : '';
      const value = row[field] || '';

      if (!isEditing) {
        return `<td${classAttr}>${escapeHtml(value)}</td>`;
      }

      if (type === 'select') {
        return `
          <td${classAttr}>
            <select class="row-select" data-field="${field}">
              <option value="年" ${value === '年' ? 'selected' : ''}>年</option>
              <option value="月" ${value === '月' ? 'selected' : ''}>月</option>
            </select>
          </td>
        `;
      }

      const inputClass = field === 'storeName' ? 'row-input name-input' : 'row-input';
      return `<td${classAttr}><input class="${inputClass}" data-field="${field}" type="text" value="${escapeAttribute(value)}"></td>`;
    }

    function saveInlineEdit(id) {
      const tr = tableBody.querySelector(`tr[data-id="${id}"]`);
      if (!tr) return;

      const updated = { ...rows.find((item) => item.id === id) };
      tr.querySelectorAll('[data-field]').forEach((fieldEl) => {
        updated[fieldEl.dataset.field] = fieldEl.value;
      });
      updated.operateTime = nowText();

      rows = rows.map((item) => item.id === id ? updated : item);
      inlineEditingId = null;
      saveRows();
      updateDateOptions();
      applyCurrentFilters();
      showToast('保存成功');
    }

    function handleQuery() {
      selectedIds.clear();
      inlineEditingId = null;
      applyCurrentFilters();
      showToast(`查询完成，共 ${visibleRows.length} 条数据`);
    }

    function handleReset() {
      dateType.value = '';
      startDate.value = '';
      endDate.value = '';
      storeFilter.querySelectorAll('input[type="checkbox"]').forEach((checkbox) => {
        checkbox.checked = true;
      });
      updateDateOptions();
      updateStoreTriggerText();
      selectedIds.clear();
      inlineEditingId = null;
      visibleRows = [...rows];
      renderTable();
      showToast('已重置');
    }

    function applyCurrentFilters() {
      const start = startDate.value.trim();
      const end = endDate.value.trim();
      const type = dateType.value;
      const selectedStores = getSelectedStores();

      visibleRows = rows.filter((row) => {
        const typeMatch = !type || row.dateType === type;
        const storeMatch = !selectedStores.length || selectedStores.includes(row.storeCode);
        const startMatch = !start || compareDateByType(row.date, start, type) >= 0;
        const endMatch = !end || compareDateByType(row.date, end, type) <= 0;
        return typeMatch && storeMatch && startMatch && endMatch;
      });

      renderTable();
    }

    function handleDateTypeChange() {
      updateDateOptions();
    }

    function updateDateOptions() {
      const startValue = startDate.value;
      const endValue = endDate.value;
      const options = getDateOptionsByType(dateType.value);
      const placeholder = dateType.value === '年'
        ? '请选择年份'
        : dateType.value === '月'
          ? '请选择月份'
          : '请选择日期';
      renderDateSelectOptions(startDate, options, placeholder, startValue);
      renderDateSelectOptions(endDate, options, placeholder, endValue);
    }

    function getDateOptionsByType(type) {
      const values = Array.from(new Set(rows
        .filter((row) => !type || row.dateType === type)
        .map((row) => normalizeDateOption(row.date, type))
        .filter(Boolean)));
      return values.sort((a, b) => b.localeCompare(a));
    }

    function normalizeDateOption(value, type) {
      const digits = String(value || '').replace(/[^0-9]/g, '');
      if (!digits) return '';
      if (type === '年') return digits.slice(0, 4);
      if (type === '月') return `${digits.slice(0, 4)}-${digits.slice(4, 6)}`;
      return digits.length >= 6 ? `${digits.slice(0, 4)}-${digits.slice(4, 6)}` : digits.slice(0, 4);
    }

    function renderDateSelectOptions(select, options, placeholder, selectedValue) {
      select.innerHTML = `<option value="">${placeholder}</option>${options.map((option) => `<option value="${escapeAttribute(option)}">${escapeHtml(option)}</option>`).join('')}`;
      if (options.includes(selectedValue)) {
        select.value = selectedValue;
      }
    }

    function toggleStoreFilter(event) {
      event.stopPropagation();
      const isOpen = storeFilter.classList.toggle('open');
      storeTrigger.setAttribute('aria-expanded', String(isOpen));
    }

    function closeStoreFilterOnOutsideClick(event) {
      if (storeFilter.contains(event.target)) return;
      storeFilter.classList.remove('open');
      storeTrigger.setAttribute('aria-expanded', 'false');
    }

    function getSelectedStores() {
      return Array.from(storeFilter.querySelectorAll('input[type="checkbox"]:checked')).map((checkbox) => checkbox.value);
    }

    function updateStoreTriggerText() {
      const checked = Array.from(storeFilter.querySelectorAll('input[type="checkbox"]:checked'));
      const total = storeFilter.querySelectorAll('input[type="checkbox"]').length;

      if (!checked.length || checked.length === total) {
        storeTrigger.textContent = '全部';
        return;
      }

      storeTrigger.textContent = checked.length === 1
        ? checked[0].parentElement.textContent.trim()
        : `已选 ${checked.length} 项`;
    }

    function handleBatchDelete() {
      if (!selectedIds.size) {
        showToast('请先单击表格行选择要删除的数据');
        return;
      }

      openConfirm('确认批量删除', `已选择 ${selectedIds.size} 条数据，删除后不可恢复，确认继续？`, () => {
        rows = rows.filter((item) => !selectedIds.has(item.id));
        selectedIds.clear();
        saveRows();
        updateDateOptions();
        applyCurrentFilters();
        showToast('批量删除成功');
      });
    }

    function openImportModal() {
      importFile.value = '';
      importFileName.textContent = '未选择文件';
      importMask.classList.add('show');
    }

    function closeImportModal() {
      importMask.classList.remove('show');
      importFile.value = '';
      importFileName.textContent = '未选择文件';
    }

    function updateImportFileName() {
      const file = importFile.files[0];
      importFileName.textContent = file ? file.name : '未选择文件';
    }

    function downloadTemplate() {
      const csv = [
        ['日期类型','日期','门店编码','门店名称','营业收入-目标数据','营业收入-实际完成','线下收入-目标数据','线下收入-实际完成','客流人数-目标数据','客流人数-实际完成','离岛客流-目标数据','离岛客流-实际完成','操作人','操作时间'],
        ['月','2026-05','6826','广州新免免税品有限公司','','xxxx.xx','9865.11','xxxx.xx','xxxx.xx','xxxx.xx','xxxx.xx','xxxx.xx','wangkeke',nowText()]
      ].map((row) => row.map(formatCsvCell).join(',')).join('\n');
      const blob = new Blob([`﻿${csv}`], { type: 'text/csv;charset=utf-8;' });
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = '零售运营中心利润表导入模板.csv';
      link.click();
      URL.revokeObjectURL(link.href);
      showToast('模板下载成功');
    }

    function handleImport() {
      const file = importFile.files[0];
      if (!file) {
        showToast('请先选择要导入的文件');
        return;
      }

      rows.unshift({
        id: createId(),
        dateType: '月',
        date: '2026-05',
        storeCode: '6826',
        storeName: '广州新免免税品有限公司',
        revenueTarget: '14,575.25',
        revenueActual: 'xxxx.xx',
        offlineTarget: '9865.11',
        offlineActual: 'xxxx.xx',
        flowTarget: 'xxxx.xx',
        flowActual: 'xxxx.xx',
        vipFlowTarget: 'xxxx.xx',
        vipFlowActual: 'xxxx.xx',
        operator: 'wangkeke',
        operateTime: nowText()
      });

      inlineEditingId = null;
      saveRows();
      updateDateOptions();
      applyCurrentFilters();
      closeImportModal();
      showToast(`导入成功：${file.name}`);
    }

    function openModal(record) {
      editingId = record ? record.id : null;
      modalTitle.textContent = record ? '编辑' : '新增';
      recordForm.reset();

      const values = record || {
        dateType: '',
        date: '',
        storeCode: '',
        storeName: '',
        revenueTarget: '',
        revenueActual: '',
        offlineTarget: '',
        offlineActual: '',
        flowTarget: '',
        flowActual: '',
        vipFlowTarget: '',
        vipFlowActual: '',
        operator: '',
        operateTime: ''
      };

      for (const [key, value] of Object.entries(values)) {
        if (recordForm.elements[key]) {
          recordForm.elements[key].value = value || '';
        }
      }

      editMask.classList.add('show');
      setTimeout(() => document.getElementById('formDateType').focus(), 0);
    }

    function closeModal() {
      editMask.classList.remove('show');
      editingId = null;
    }

    function openConfirm(title, text, action) {
      document.getElementById('confirmTitle').textContent = title;
      document.getElementById('confirmText').textContent = text;
      confirmAction = action;
      confirmMask.classList.add('show');
    }

    function closeConfirm() {
      confirmMask.classList.remove('show');
      confirmAction = null;
    }

    function normalizeRecord(data) {
      return {
        dateType: data.dateType || '月',
        date: data.date || '',
        storeCode: data.storeCode || '',
        storeName: data.storeName || '',
        revenueTarget: data.revenueTarget || '',
        revenueActual: data.revenueActual || '',
        offlineTarget: data.offlineTarget || '',
        offlineActual: data.offlineActual || '',
        flowTarget: data.flowTarget || '',
        flowActual: data.flowActual || '',
        vipFlowTarget: data.vipFlowTarget || '',
        vipFlowActual: data.vipFlowActual || '',
        operator: data.operator || '',
        operateTime: data.operateTime || nowText()
      };
    }

    function createId() {
      return `row-${Date.now()}-${Math.random().toString(16).slice(2)}`;
    }

    function nowText() {
      const now = new Date();
      const pad = (num) => String(num).padStart(2, '0');
      return `${now.getFullYear()}-${pad(now.getMonth() + 1)}-${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
    }

    function compareDateByType(left, right, type) {
      const length = type === '年' ? 4 : type === '月' ? 6 : 8;
      const normalize = (value) => String(value).replace(/[^0-9]/g, '').padEnd(length, '0').slice(0, length);
      return normalize(left).localeCompare(normalize(right));
    }

    function formatCsvCell(value) {
      return `"${String(value ?? '').replace(/"/g, '""')}"`;
    }

    function escapeAttribute(value) {
      return escapeHtml(value);
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    let toastTimer = null;
    function showToast(message) {
      clearTimeout(toastTimer);
      toast.textContent = message;
      toast.classList.add('show');
      toastTimer = setTimeout(() => toast.classList.remove('show'), 1800);
    }
  </script>
</body>
</html>
